<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2° Aniversario 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #ffdde1, #ee9ca7);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.95);
    width: 90%;
    max-width: 600px;
    padding: 50px 40px;
    border-radius: 24px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    text-align: center;
    position: relative;
    animation: float 5s ease-in-out infinite;
    backdrop-filter: blur(10px);
}

h1 {
    font-family: 'Playfair Display', serif;
    color: #d94862;
}

p {
    color: #333;
}

button {
    font-size: 18px;
    padding: 12px 28px;
    margin: 10px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
}

#yes {
    background: #ff4d6d;
    color: white;
    box-shadow: 0 10px 25px rgba(255,77,109,0.4);
}

#yes:hover { transform: scale(1.07); }

#no {
    background: #6c8cff;
    color: white;
    position: absolute;
}

/* 💖 LLUVIA */
.floating {
    position: absolute;
    font-size: 1.8rem;
    animation: fall linear infinite;
    opacity: 0.7;
}

@keyframes fall {
    from {
        transform: translateY(-100px) rotate(0deg);
    }
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}

/* glow sutil */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 24px;
    background: linear-gradient(45deg, #ff4d6d, #ff9aa2, #ffc3a0);
    z-index: -1;
    filter: blur(10px);
    opacity: 0.6;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}
</style>
</head>

<body>

<div class="card">
    <h1>¿Celebramos nuestros 2 años? 💖</h1>

    <p>Alexandra...</p>
    <p>Cumpliremos <strong>2 años juntos</strong>.</p>
    <p>Quiero que el día sea especial para nosotros.</p>
    <p>¿Te gustaría vivirlo conmigo? 💫</p>

    <button id="yes" onclick="window.location.href='collage.html'">Obvio sí 💖</button>
    <button id="no" onmouseover="moveButton()">No 😢</button>
</div>

<!-- 💖 lluvia dinámica -->
<script>
const emojis = ["💖","💘","💞","😍","🥰"];

for(let i=0; i<25; i++){
    let el = document.createElement("div");
    el.className = "floating";
    el.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

    el.style.left = Math.random()*100 + "vw";
    el.style.animationDuration = (4 + Math.random()*4) + "s";
    el.style.fontSize = (1 + Math.random()*1.5) + "rem";

    document.body.appendChild(el);
}

function moveButton() {
    const card = document.querySelector(".card");
    const noBtn = document.getElementById("no");

    const maxX = card.clientWidth - noBtn.clientWidth;
    const maxY = card.clientHeight - noBtn.clientHeight;

    noBtn.style.left = Math.random()*maxX + "px";
    noBtn.style.top = Math.random()*maxY + "px";
}
</script>

</body>
</html>
